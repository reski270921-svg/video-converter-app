<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NexStream | Sistem Ekstraksi Media Final</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. VARIABEL GLOBAL & RESET (FONDASI UI)
           ========================================================================== */
        :root {
            --neon-purple: #9b5de5;
            --neon-pink: #f15bb5;
            --neon-red: #ee2e31;
            --neon-cyan: #00f3ff;
            --neon-blue: #00d4ff;
            --dark-bg: #05050a;
            --glass-bg: rgba(15, 15, 25, 0.45);
            --glass-border: rgba(0, 243, 255, 0.2);
            --font-cyber: 'Orbitron', sans-serif;
            --font-ui: 'Rajdhani', sans-serif;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }
        
        input { 
            user-select: auto; 
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--dark-bg);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: url('https://4kwallpapers.com/images/walls/thumbs_3t/14974.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* ==========================================================================
           2. ANIMASI KUSTOM (SUDAH DIPERHALUS)
           ========================================================================== */
        @keyframes floatSlow {
            0% { transform: translateY(0px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); }
            50% { transform: translateY(-12px); filter: drop-shadow(0 30px 25px rgba(0,0,0,0.3)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5)); }
        }

        /* Pergerakan glitch diperhalus agar tidak terlalu agresif */
        @keyframes glitch-full {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-0.5px, 0.5px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(-0.5px, 0.5px); }
            40% { clip-path: inset(30% 0 20% 0); transform: translate(-0.5px, 0.5px); }
            60% { clip-path: inset(15% 0 80% 0); transform: translate(-0.5px, 0.5px); }
            80% { clip-path: inset(5% 0 70% 0); transform: translate(-0.5px, 0.5px); }
            100% { clip-path: inset(80% 0 5% 0); transform: translate(-0.5px, 0.5px); }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.98) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes shineFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ==========================================================================
           3. LAYAR UTAMA (LANDING PAGE)
           ========================================================================== */
        #view-landing {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; z-index: 100; padding: 20px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .landing-animated-zone { animation: floatSlow 8s ease-in-out infinite; }

        .title-massive {
            font-size: clamp(3.5rem, 8vw, 7.5rem);
            font-weight: 900;
            text-transform: uppercase; letter-spacing: 6px;
            position: relative; display: inline-block;
            background: linear-gradient(90deg, var(--neon-purple) 0%, var(--neon-cyan) 30%, #ffffff 50%, var(--neon-cyan) 70%, var(--neon-purple) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
            color: transparent;
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.1);
            animation: shineFlow 4s linear infinite;
            /* Efek cahaya dikembalikan dan diperkuat */
            text-shadow: 0 0 40px rgba(0, 243, 255, 0.8), 0 0 20px rgba(155, 93, 229, 0.6);
        }

        .title-massive::before, .title-massive::after {
            content: "NEXSTREAM"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #9b5de5 0%, #f15bb5 25%, #ee2e31 50%, #00f3ff 75%, #00d4ff 100%);
            -webkit-background-clip: text; background-clip: text; color: transparent; opacity: 0.6;
        }

        /* Durasi animasi diperlambat (8s dan 9s) */
        .title-massive::before { left: 4px; text-shadow: -2px 0 #ff007f; animation: glitch-full 8s infinite linear alternate-reverse; z-index: -1; pointer-events: none;}
        .title-massive::after { left: -4px; text-shadow: 2px 0 #00f3ff; animation: glitch-full 9s infinite linear alternate-reverse; z-index: -2; pointer-events: none;}

        .landing-static-zone { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        
        .subtitle-landing {
            font-family: var(--font-cyber); font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: #dcdcdc; letter-spacing: 4px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .btn-initiate-small {
            padding: 12px 30px; font-size: 1rem; font-weight: 700; color: #fff;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border: none; border-radius: 30px; cursor: pointer; font-family: var(--font-cyber);
            text-transform: uppercase; letter-spacing: 2px;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        .btn-initiate-small:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6); }
        .btn-initiate-small:active { transform: translateY(4px) scale(0.95); box-shadow: inset 0 5px 12px rgba(0, 0, 0, 0.5); }

        /* ==========================================================================
           4. GLOBAL MENU & DROPDOWN STYLING
           ========================================================================== */
        .btn-global-dots, .btn-item-dots {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 1.2rem; padding: 5px 12px; border-radius: 8px;
            cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;
        }
        .btn-global-dots:hover, .btn-item-dots:hover { background: rgba(0, 243, 255, 0.3); border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.4); }
        
        .dropdown-menu-content {
            display: none; position: absolute; right: 0; top: 45px;
            background: rgba(10, 10, 20, 0.98); border: 1px solid var(--neon-cyan);
            border-radius: 10px; min-width: 180px; box-shadow: 0 10px 25px rgba(0,0,0,0.9);
            z-index: 9999; overflow: hidden;
        }
        .dropdown-menu-content.show { display: flex; flex-direction: column; }
        .dropdown-menu-content a {
            color: white; padding: 12px 16px; text-decoration: none; font-size: 0.95rem;
            display: block; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .dropdown-menu-content a:hover { background: rgba(0, 243, 255, 0.15); color: var(--neon-cyan); padding-left: 20px; }

        /* ==========================================================================
           5. APLIKASI UTAMA
           ========================================================================== */
        #main-application { display: none; width: 100%; min-height: 100vh; flex-direction: column; animation: fadeInScale 0.6s ease-out; }
        
        .top-navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 50px; background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 900; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .nav-brand { font-family: var(--font-cyber); font-size: 1.5rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .nav-brand span { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        
        .nav-right-section { display: flex; align-items: center; gap: 30px; }
        .nav-menu { display: flex; gap: 20px; }
        .nav-item { 
            color: #888; font-family: var(--font-cyber); font-size: 1rem; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; 
            padding: 5px 0; transition: all 0.3s ease; position: relative; 
        }
        .nav-item:hover { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .nav-item.active { color: var(--neon-pink); text-shadow: 0 0 10px rgba(241, 91, 181, 0.4); }
        .nav-item.active::after { 
            content: ''; position: absolute; bottom: -5px; left: 0; 
            width: 100%; height: 2px; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); 
        }

        .app-container { flex: 1; width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px; padding-bottom: 100px; }
        .glass-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section-title { text-align: center; font-family: var(--font-cyber); font-size: 1.8rem; color: #fff; margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        
        .app-view { display: none; animation: fadeInScale 0.4s ease-out; }
        .app-view.active { display: block; }

        /* ==========================================================================
           6. KOMPONEN TAB: CONVERTER
           ========================================================================== */
        .converter-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .url-input { 
            width: 100%; max-width: 500px; background: rgba(0, 0, 0, 0.6); 
            border: 2px solid var(--neon-cyan); color: #fff; padding: 20px 25px; 
            font-size: 1.1rem; border-radius: 12px; outline: none; transition: 0.3s; 
            box-shadow: inset 0 0 10px rgba(0,243,255,0.1);
        }
        .url-input:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(241, 91, 181, 0.4), inset 0 0 10px rgba(241,91,181,0.2); }
        
        .btn-process { 
            background: rgba(0, 0, 0, 0.6); color: var(--neon-cyan); 
            border: 2px solid var(--neon-cyan); padding: 15px 50px; 
            font-family: var(--font-cyber); font-size: 1.1rem; font-weight: 700; 
            border-radius: 12px; cursor: pointer; text-transform: uppercase; transition: 0.3s; 
            box-shadow: 0 0 10px rgba(0,243,255,0.2);
        }
        .btn-process:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* ==========================================================================
           7. KOMPONEN TAB: DATABASE & FILE MANAGEMENT
           ========================================================================== */
        .db-header { display: flex; gap: 20px; margin-bottom: 30px; }
        .search-bar { flex: 1; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 243, 255, 0.3); color: #fff; padding: 15px 25px; border-radius: 10px; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.3); }
        
        .btn-folder { background: rgba(0,0,0,0.4); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 0 20px; border-radius: 10px; font-family: var(--font-cyber); font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-folder:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px rgba(0, 243, 255, 0.6); }

        .db-grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        
        .db-sidebar { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(241, 91, 181, 0.2); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }
        
        .folder-item { 
            padding: 12px 15px; color: #ccc; font-size: 1.1rem; border-radius: 10px; cursor: pointer; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.2s; 
        }
        .folder-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .folder-item.active { background: rgba(241, 91, 181, 0.15); color: var(--neon-pink); border: 1px solid rgba(241, 91, 181, 0.4); text-shadow: 0 0 5px rgba(241,91,181,0.5); }
        .folder-name { pointer-events: none; }
        
        .folder-rename-btn {
            font-size: 0.9rem; padding: 5px; opacity: 0; transition: 0.2s;
            background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer;
        }
        .folder-item:hover .folder-rename-btn { opacity: 1; }
        .folder-rename-btn:hover { background: var(--neon-cyan); color: #000; }

        /* CLASS DRAGGING DITAMBAHKAN DI SINI */
        .dragging {
            opacity: 0.5;
            border: 1px dashed var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
        }

        .db-content { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 16px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .file-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.03); padding: 15px 20px; 
            border-radius: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.2s ease; cursor: pointer; position: relative; 
            z-index: 1;
        }
        .file-item:hover { background: rgba(0, 243, 255, 0.05); border-color: rgba(0,243,255,0.2); }
        .file-item.menu-active { z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-color: var(--neon-cyan); background: rgba(0, 243, 255, 0.1); }

        .file-info { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; pointer-events: none; }
        
        .file-controls { display: flex; align-items: center; gap: 10px; position: relative; }
        .btn-card-play { 
            background: rgba(0, 243, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-card-play:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 10px var(--neon-cyan); transform: scale(1.05); }

        /* ==========================================================================
           8. FITUR SELEKSI MASSAL (LONG PRESS)
           ========================================================================== */
        .file-item.selectable::before {
            content: ''; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; border: 2px solid var(--neon-pink); border-radius: 4px;
            background: transparent; transition: 0.2s; opacity: 0; pointer-events: none;
        }
        .file-item.selectable { padding-left: 45px; }
        .file-item.selectable .file-controls { display: none; }
        .file-item.selected::before { background: var(--neon-pink); opacity: 1; box-shadow: inset 0 0 0 3px #05050a, 0 0 10px var(--neon-pink); }
        .file-item.selected { background: rgba(241, 91, 181, 0.1); border-color: var(--neon-pink); }

        #bulk-toolbar {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.95); border: 1px solid var(--neon-pink);
            padding: 15px 30px; border-radius: 50px; display: flex; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(241,91,181,0.3); z-index: 1000; transition: bottom 0.4s ease;
        }
        #bulk-toolbar.active { bottom: 30px; }
        .bulk-btn { font-family: var(--font-cyber); font-weight: bold; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .bulk-btn.cancel { background: transparent; color: #fff; border: 1px solid #555; }
        .bulk-btn.cancel:hover { background: rgba(255,255,255,0.1); }
        .bulk-btn.delete { background: var(--neon-red); color: #fff; }
        .bulk-btn.delete:hover { box-shadow: 0 0 15px var(--neon-red); }
        .bulk-btn.save { background: var(--neon-cyan); color: #000; }
        .bulk-btn.save:hover { box-shadow: 0 0 15px var(--neon-cyan); }

        /* ==========================================================================
           9. MEDIA QUERIES
           ========================================================================== */
        @media screen and (max-width: 768px) {
            .top-navbar { flex-direction: column; gap: 15px; padding: 15px; }
            .nav-right-section { width: 100%; justify-content: space-between; }
            .nav-menu { flex-wrap: wrap; justify-content: center; width: 100%; gap: 10px; }
            .db-grid { grid-template-columns: 1fr; }
            .db-sidebar { max-height: 200px; }
            .file-item { flex-direction: column; gap: 15px; align-items: flex-start; }
            .file-controls { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div id="view-landing">
        <div class="landing-animated-zone">
            <h1 class="title-massive">NEXSTREAM</h1>
        </div>
        <div class="landing-static-zone">
            <h2 class="subtitle-landing">Sistem Ekstraksi Media V2.4</h2>
            <button class="btn-initiate-small" onclick="toggleSystem(true)">Initiate System</button>
        </div>
    </div>

    <div id="main-application">
        
        <nav class="top-navbar">
            <div class="nav-brand">NEX<span>STREAM</span></div>
            
            <div class="nav-right-section">
                <div class="nav-menu">
                    <div class="nav-item" onclick="toggleSystem(false)">Beranda</div>
                    <div class="nav-item active" id="tab-converter" onclick="switchTab('converter')">Converter</div>
                    <div class="nav-item" id="tab-database" onclick="switchTab('database')">Database</div>
                </div>

                <div id="global-action-menu" style="position: relative; display: none;">
                    <button class="btn-global-dots" onclick="toggleMenu('global-menu', this, event)">⋮</button>
                    <div id="global-menu" class="dropdown-menu-content">
                        <a href="#" onclick="alert('Pindahkan semua item'); closeAllMenus()">📁 Pindahkan Semua</a>
                        <a href="#" onclick="alert('Hapus semua item'); closeAllMenus()">🗑️ Hapus Semua</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="app-container">
            
            <div id="app-converter" class="app-view active">
                <div class="glass-box">
                    <h2 class="section-title">Target Ekstraksi Media</h2>
                    <div class="converter-wrapper">
                        <input type="text" id="url-input" class="url-input" placeholder=">> Tempel URL Target di sini..." autocomplete="off">
                        <button class="btn-process" onclick="processLink()">Ekstrak & Simpan</button>
                    </div>
                </div>
            </div>

            <div id="app-database" class="app-view">
                <div class="glass-box">
                    <h2 class="section-title">Database Penyimpanan</h2>
                    <div class="db-header">
                        <input type="text" class="search-bar" placeholder="Pindai file...">
                        <button class="btn-folder" onclick="createNewFolder()">+ Folder Baru</button>
                    </div>
                    
                    <div class="db-grid">
                        <div class="db-sidebar" id="folder-list">
                            <div class="folder-item active" onclick="selectFolder(this)">
                                <span class="folder-name">📁 Semua File</span>
                            </div>
                            <div class="folder-item" onclick="selectFolder(this)">
                                <span class="folder-name">📁 Unduhan Default</span>
                            </div>
                        </div>
                        
                        <div class="db-content" id="file-list">
                            </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="bulk-toolbar">
        <button class="bulk-btn cancel" onclick="exitSelectionMode()">Batal</button>
        <button class="bulk-btn save" onclick="alert('Mendownload file terpilih!')">Simpan</button>
        <button class="bulk-btn delete" onclick="deleteSelected()">Hapus</button>
    </div>

    <script>
        // 1. KONTROL TAMPILAN AWAL
        function toggleSystem(isEntering) {
            const landing = document.getElementById('view-landing');
            const mainApp = document.getElementById('main-application');
            
            if (isEntering) {
                landing.style.opacity = '0';
                setTimeout(() => { 
                    landing.style.display = 'none'; 
                    mainApp.style.display = 'flex'; 
                }, 400);
            } else {
                mainApp.style.display = 'none'; 
                landing.style.display = 'flex';
                void landing.offsetWidth;
                landing.style.opacity = '1';
            }
        }

        // 2. KONTROL TAB & VISIBILITAS MENU GLOBAL
        function switchTab(tabName) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById('app-' + tabName).classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');

            const globalMenuDiv = document.getElementById('global-action-menu');
            if (tabName === 'database') {
                globalMenuDiv.style.display = 'block';
            } else {
                globalMenuDiv.style.display = 'none';
            }
        }

        // 3. MANAJEMEN FOLDER
        function selectFolder(folderElement) {
            document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
            folderElement.classList.add('active');
        }

        function createNewFolder() {
            let folderName = prompt("Masukkan nama folder baru:");
            if (folderName && folderName.trim() !== "") {
                const folderList = document.getElementById('folder-list');
                const newFolder = document.createElement('div');
                newFolder.className = 'folder-item';
                newFolder.draggable = true; 
        
                newFolder.innerHTML = `
                    <span class="folder-name">📁 ${folderName.trim()}</span>
                    <span class="folder-rename-btn" onclick="renameFolder(event, this)">✏️</span>
                `;
        
                newFolder.onclick = function() { selectFolder(this) };
                
                // Event Listener Drag and Drop untuk folder baru
                newFolder.addEventListener('dragstart', () => newFolder.classList.add('dragging'));
                newFolder.addEventListener('dragend', () => newFolder.classList.remove('dragging'));
        
                folderList.appendChild(newFolder);
            }
        }

        function renameFolder(event, buttonElement) {
            event.stopPropagation();
            let parentFolder = buttonElement.parentElement;
            let nameSpan = parentFolder.querySelector('.folder-name');
            
            let currentName = nameSpan.innerText.replace('📁 ', '');
            let newName = prompt("Ubah nama folder:", currentName);
            
            if(newName && newName.trim() !== "") {
                nameSpan.innerText = `📁 ${newName.trim()}`;
            }
        }

        // MENGURUTKAN FOLDER (Drag & Drop Logic)
        const folderList = document.getElementById('folder-list');
        folderList.addEventListener('dragover', (e) => {
            e.preventDefault();
            const afterElement = getDragAfterElement(folderList, e.clientY);
            const dragging = document.querySelector('.dragging');
            if (dragging) {
                if (afterElement == null) {
                    folderList.appendChild(dragging);
                } else {
                    folderList.insertBefore(dragging, afterElement);
                }
            }
        });

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.folder-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 4. LOGIKA EKSTRAKSI LINK
        let fileIdCounter = 0;
        function processLink() {
            const input = document.getElementById('url-input');
            const url = input.value.toLowerCase();
            
            if (!url) { 
                alert("Harap masukkan URL target!"); 
                return; 
            }

            let icon = '📄', ext = '.bin';
            if (url.includes('.mp4') || url.includes('youtube')) { icon = '🎬'; ext = '.mp4'; }
            else if (url.includes('.mp3') || url.includes('spotify')) { icon = '🎵'; ext = '.mp3'; }
            else if (url.includes('.jpg') || url.includes('.png')) { icon = '🖼️'; ext = '.png'; }

            const fileName = `ext_media_${Math.floor(Math.random() * 9000) + 1000}${ext}`;
            addFileToDatabase(icon, fileName);
            
            input.value = "";
            switchTab('database');
        }

        // 5. PENAMBAHAN FILE KE DATABASE
        function addFileToDatabase(icon, fileName) {
            fileIdCounter++;
            const fileId = 'file_' + fileIdCounter;
            
            const fileList = document.getElementById('file-list');
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.id = fileId;
            
            fileItem.innerHTML = `
                <div class="file-info">${icon} ${fileName}</div>
                <div class="file-controls">
                    <button class="btn-card-play" onclick="event.stopPropagation(); alert('Memutar ${fileName}')">▶</button>
                    <div style="position: relative;">
                        <button class="btn-item-dots" onclick="toggleMenu('menu-${fileId}', this, event)">⋮</button>
                        <div id="menu-${fileId}" class="dropdown-menu-content">
                            <a href="#" onclick="alert('Ubah nama ${fileName}'); closeAllMenus()">✏️ Ubah Nama</a>
                            <a href="#" onclick="alert('Share ${fileName}'); closeAllMenus()">🔗 Bagikan</a>
                            <a href="#" onclick="deleteSingleFile('${fileId}'); closeAllMenus()">🗑️ Hapus</a>
                        </div>
                    </div>
                </div>
            `;

            setupLongPress(fileItem);
            fileList.prepend(fileItem);
        }

        function deleteSingleFile(fileId) {
            if(confirm("Yakin ingin menghapus file ini?")) {
                document.getElementById(fileId).remove();
            }
        }

        // 6. SISTEM DROPDOWN MENU
        function toggleMenu(menuId, buttonElement, event) {
            event.stopPropagation();

            const isCurrentlyOpen = document.getElementById(menuId).classList.contains('show');
            closeAllMenus();

            if (!isCurrentlyOpen) {
                document.getElementById(menuId).classList.add('show');
                const parentRow = buttonElement.closest('.file-item');
                if (parentRow) {
                    parentRow.classList.add('menu-active');
                }
            }
        }

        function closeAllMenus() {
            document.querySelectorAll('.dropdown-menu-content').forEach(menu => {
                menu.classList.remove('show');
            });
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('menu-active');
            });
        }

        window.addEventListener('click', function(event) {
            if (!event.target.matches('.btn-global-dots') && !event.target.matches('.btn-item-dots')) {
                closeAllMenus();
            }
        });

        // 7. SISTEM LONG PRESS & MULTIPLE SELECTION
        let pressTimer;
        let isSelectionMode = false;

        function setupLongPress(element) {
            element.addEventListener('touchstart', (e) => startPress(e, element), {passive: true});
            element.addEventListener('touchend', cancelPress);
            element.addEventListener('touchmove', cancelPress);
            
            element.addEventListener('mousedown', (e) => startPress(e, element));
            element.addEventListener('mouseup', cancelPress);
            element.addEventListener('mouseleave', cancelPress);

            element.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('.dropdown-menu-content')) return;
                
                if (isSelectionMode) { 
                    element.classList.toggle('selected'); 
                }
            });
        }

        function startPress(e, element) {
            if(e.target.tagName === 'BUTTON' || e.target.closest('.dropdown-menu-content') || e.target.classList.contains('folder-rename-btn')) return;

            pressTimer = setTimeout(() => {
                if (!isSelectionMode) {
                    enterSelectionMode();
                    element.classList.add('selected'); // Otomatis centang item yang ditekan
                }
            }, 800); // Tahan 800ms untuk aktifkan
        }

        function cancelPress() {
            clearTimeout(pressTimer);
        }

        function enterSelectionMode() {
            isSelectionMode = true;
            document.getElementById('bulk-toolbar').classList.add('active');
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.add('selectable');
            });
            closeAllMenus(); // Tutup menu jika ada yang terbuka
        }

        function exitSelectionMode() {
            isSelectionMode = false;
            document.getElementById('bulk-toolbar').classList.remove('active');
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('selectable');
                item.classList.remove('selected');
            });
        }

        function deleteSelected() {
            const selectedItems = document.querySelectorAll('.file-item.selected');
            if(selectedItems.length === 0) {
                alert("Pilih file terlebih dahulu!");
                return;
            }
            
            if(confirm(`Yakin ingin menghapus ${selectedItems.length} file terpilih?`)) {
                selectedItems.forEach(item => item.remove());
                exitSelectionMode();
            }
        }

        // 8. INISIALISASI SAAT HALAMAN DIMUAT
        document.addEventListener('DOMContentLoaded', () => {
            // Aktifkan drag and drop untuk folder bawaan (Semua File, Unduhan Default)
            document.querySelectorAll('.folder-item').forEach(item => {
                item.draggable = true;
                item.addEventListener('dragstart', () => item.classList.add('dragging'));
                item.addEventListener('dragend', () => item.classList.remove('dragging'));
            });
        });

    </script>
</body>
</html>
